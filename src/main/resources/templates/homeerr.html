<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>SISTEMA NFS-e</title>
  <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css'>
  <link rel="stylesheet" th:href="@{/style.css}">

<body>

      <div class="content-wrap" id="topo">

            </div>
          </div>
          <div class=" step">
            <i class="edit icon"></i>
            <div class="content">
              <div class="title">DESCRIÇÂO</div>
            </div>
          </div>
          <div class="step">

            <div class="content">

            </div>
          </div>
        </div>

        <section id="section-flip-1">

          <form class="ui large form" id="form1">

              <div class="field ">

              </div>

                <div class="ui left icon input  ">
                  <i class=" address user icon"></i>
                  <input type="text" id="nome" name="nome" placeholder="               NOME">
                </div>
              </div>

             
              <div>
                <span id="ra" th:value="*{error}"></span>
              </div>

              <div class=" ui field">
                <div class="ui  left icon input" id="altend" style="display:none;">
                  <i class=" map marker alternate icon"></i>
                  <input type="text" readonly="true" id="endereco" name="endereco">
                </div>

              </div>
              <div class=" ui field">
                <div class="ui  left icon input" id="altemail" style="display:none;">

                </div>

              </div>

          </form>
          <div class="ui message  ">

            PARA CANCELAMENTO DE NOTA LIGUE PARA O ADMINISTRADOR
          </div>
        </section>
        <section id="section-flip-2">

          <form class="ui large form  " id="form2">
            <div class="ui segment">

              <div class="field">
                <div class="ui left icon input">
                  <i class="ticket alternate icon"></i>
                  <input type="text" name="placa" id="placa" placeholder="PLACA">
                </div>
              </div>
              <div class="field">
                <div class="ui left icon input">
                  <i class="car icon"></i>
                  <input type="text" name="modelo" id="modelo" placeholder="MODELO">
                </div>
              </div>
              <div class="field">
                <div class="ui left icon input">
                  <i class="money bill alternate icon"></i>
                  <input type="text" name="valor" id="valor" placeholder="VALOR">
                </div>
              </div>
              <div class="ui fluid large positive  submit button" id="btnSalvar">Emitir Nota Fiscal</div>
              
              
            </div>
            <div class="ui error message"></div>
          </form>


        </section>
        <section id="section-flip-3">


          <div class="ui message">
            NOTA FISCAL SERA ENVIADA POR E-MAIL
          </div>

      <!-- /content -->
    </div>
    <!-- /tabs -->

  <script src=script.js></script>

  <!-- Consumindo Api da Receita ,para Localizar dados da empresa -->
  <script>
    document.querySelector('#cpfOuCnpj').addEventListener('keyup', function (e) {

      let cnpj_limpo = e.target.value.replace(/[^0-9]/g, '');
      

      if (cnpj_limpo.length > 13) {
        const url = `http://localhost:9090/consulta/${cnpj_limpo}`

        fetch(url)
          .then(response => {
            if (!response.ok) {

              throw new Error(`Http error! Status: ${response.status}`);

            }
            return response.json();
          })
          .then(data => {
            if (data.erro) {
              alert(`CNPJ nao encontrado`)
              return
            }

            document.querySelector('#nome').value = data.empresa.razao_social;
            document.querySelector('#email').value = data.empresa.email;
            document.querySelector('#endereco').value =
              data.empresa.endereco.logradouro + '  |  ' +
              data.empresa.endereco.bairro + '  |  ' +
              data.empresa.endereco.cidade + '  |  ' +
              data.empresa.endereco.uf;
            document.querySelector('#altemail').removeAttribute('style')
            document.querySelector('#altend').removeAttribute('style')

          })
          .catch(error => {
            console.error('houve um problema na requisição'.error)
          })

      }
      if (cnpj_limpo.length < 12) {
        return;
      }

    })
  </script>

  <!-- Mascara para Campo CNPJ ou CPF -->
  <script>
    document.getElementById('cpfOuCnpj').addEventListener('input', function (e) {

      let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,3})(\d{0,3})(\d{0,4})(\d{0,2})/);
      e.target.value = !x[2] ? x[1] : x[1] + '.' + x[2] + (x[3] ? '.' : '') + x[3] + (x[4] ? '/' : x[4]) + x[4] + (x[5] ? '-' + x[5] : '');

      if (e.target.value.length < 15) {
        x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,3})(\d{0,2})/);
        e.target.value = !x[2] ? x[1] : x[1] + '.' + x[2] + (x[3] ? '.' : '') + x[3] + (x[4] ? '-' + x[4] : '');
      }

      // console.log('Com formatação: ' + e.target.value);

      //Caso queira pegar apenas os números use essa função para remover todos os caracteres menos os números em Javascript
      let valor = e.target.value.replace(/[^0-9]/g, '');
      // console.log('Sem formatação: ' + valor);
    });
  </script>

  <!-- Mascara para Dinheiro para R$0,0 -->
  <script>
    $(function () {
      $("#valor").maskMoney({
        prefix: 'R$ ',
        thousands: '.',
        decimal: ','
      })
    });

    //mascara para Placa de carro
    $(document).ready(function () {
      // A máscara suporta tanto o modelo antigo quanto o Mercosul
      var options = {
        onKeyPress: function (placa, e, field, options) {
          // Converte automaticamente todas as letras digitadas para maiúsculas
          $(field).val(placa.toUpperCase());
        }
      };

      // Máscara: AAA-0A00 (Padrão Mercosul)
      $('#placa').mask('AAA-0A00', options);
    });
  </script>


  <!-- Capturando informaçoes dos dois formularios e enviando para o ClienteApi via POST -->
  <script>
    const botao = document.getElementById('btnSalvar');
    botao.addEventListener('click', event => {
      event.preventDefault();
      // 1. Seleciona os dois formulários no DOM
      const formA = document.getElementById("form1");
      const formB = document.getElementById("form2");

      // 2. Cria os objetos FormData para cada um
      const dadosA = new FormData(formA);
      const dadosB = new FormData(formB);

      // 3. Converte os dados para objetos JavaScript simples
      const valoresA = Object.fromEntries(dadosA);
      const valoresB = Object.fromEntries(dadosB);

      // 4. Junta os dados em um único objeto para manipulação posterior
      const dadosCombinados = { ...valoresA, ...valoresB };
      console.log(dadosCombinados)

      const url = `http://localhost:9090/`
      fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json' // Inform the server you are sending JSON
        },
        body: JSON.stringify(dadosCombinados)
      })
        .then(response => {

          if (!response.ok) {

            throw new Error(`Http error! Status: ${response.status}`);

          }
          return response.json();
        })
        .then(data => {
          if (data.erro) {
            alert(`CNPJ nao encontrado`)
            return
          }

        })
        .catch(error => {
          console.error('houve um problema na requisição'.error)
        })

    })
  </script>
